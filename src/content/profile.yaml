name: "Yang-Jun Joo, Ph.D."
title: "Yang-Jun Joo, Ph.D. | Autonomous Driving Safety & Mobility AI"
headline: "Autonomous Driving Safety · Mobility AI · Large-Scale Traffic Data Analytics"
summary: "I develop data-driven methods to evaluate driving risk, identify safety-critical scenarios, and support safer autonomous and connected mobility systems. My work combines traffic safety, large-scale mobility data, machine learning, vision-language models, and uncertainty-aware prediction."
location: "Orlando, FL (Open to Remote / Relocation)"
