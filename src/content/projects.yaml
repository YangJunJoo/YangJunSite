- title: "Assessing Perceived Risk Of Autonomous Vehicle Passengers Using Dashcam Crash Video"
  category: "PI Research Project"
  status: "Sejong Science Fellowship (2024.09 – 2025.08)"
  featured: true
  tags:
    - "Autonomous Driving"
    - "Perceived Risk"
    - "Dashcam Video Analysis"
    - "Sejong Science Fellowship"
    - "National Research Foundation of Korea"
  problem: "Autonomous driving systems need to align with human risk perception in near-miss and safety-critical scenarios to improve passenger trust."
  data: "Naturalistic driving/crash dashcam videos, passenger survey responses, and risk ratings."
  methods: "Surveys, perceived risk modeling, regression models, and statistical comparison between AV and human-driven vehicle scenarios."
  output: "Completed PI project funded by National Research Foundation of Korea (73.5M KRW), yielding publication manuscripts (under 1st revision at IEEE T-ITS)."
  industry_relevance: "Enables AV developers to align vehicle behaviors with passenger risk expectations and design trust-building passenger protocols."

