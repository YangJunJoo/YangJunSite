focus_areas:
  - title: "Autonomous Driving Safety"
    description: "Developing human-aligned and uncertainty-aware driving risk metrics to identify and evaluate safety-critical scenarios for next-generation autonomous vehicle systems."
  - title: "Mobility AI & Vision-Language Models"
    description: "Applying state-of-the-art vision-language models and deep learning to interpret complex traffic scenes, improve scenario understanding, and automate safety analytics."
  - title: "Large-Scale Traffic Data Analytics"
    description: "Designing end-to-end data pipelines for high-resolution traffic signal controller data (ATSPM) and telemetry data to generate operational insights and safety evaluations."
  - title: "Transportation Risk & Insurance Analytics"
    description: "Connecting infrastructure performance data, statistical driving conflict risk modeling, and predictive safety indicators to support insurance underwriting and risk modeling."
