focus_areas:
  - title: "Autonomous Driving Safety Evaluation"
    description: "Developing human-aligned risk perception metrics and evaluating driverless AV passenger risk judgment using naturalistic videos and surveys."
  - title: "Uncertainty Calibration & VLMs"
    description: "Applying conformal prediction to calibrate vision-language models (VLM) for driving scene QA, ensuring reliable confidence bounds in safety-critical settings."
  - title: "Large-Scale Mobility Data Pipelines"
    description: "Designing spatial-temporal data workflows and dashboards to process high-resolution traffic signal logs (ATSPM) and vehicle telemetry."
  - title: "Traffic Safety & Risk Analytics"
    description: "Utilizing risk field theory and surrogate safety measures (SSMs) to model rear-end conflicts and identify micro-level safety hotspots."
