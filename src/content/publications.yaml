- group: "Autonomous Driving, VLM, and AI Safety"
  items:
    - title: "Conformalized Vision-Language Models for Uncertainty-Aware Risk Assessment in Autonomous Driving"
      authors: "Yang-Jun Joo, Mohamed Abdel-Aty"
      venue: "Accepted at 2026 ICML Workshop / WACV 2027 Preparation"
      year: 2026
      tags:
        - "Conformal Prediction"
        - "Vision-Language Models"
        - "Autonomous Driving"
        - "Safety"
      summary: "This paper proposes a mathematical framework using conformal prediction to calibrate the uncertainty of vision-language models when evaluating driving risks."
      industry_relevance: "It provides a robust mathematical screening tool for AV companies to catch safety-critical edge cases with statistical coverage guarantees."
      link: "#"

    - title: "Aligning Automated Driving Risk: A Vision-Language-Human Validation Paradigm"
      authors: "Yang-Jun Joo, Mohamed Abdel-Aty, et al."
      venue: "IEEE Transactions on Intelligent Transportation Systems (Under Revision)"
      year: 2026
      tags:
        - "Vision-Language Models"
        - "Autonomous Driving"
        - "Risk Perception"
        - "IEEE T-ITS"
      summary: "Investigates the alignment between human driver risk perception and vision-language model interpretations across diverse edge-case scenarios."
      industry_relevance: "Provides key methodologies for validating AV safety metrics against real-world human risk tolerance and behavior."
      link: "#"

- group: "Transportation Safety and Smart Mobility"
