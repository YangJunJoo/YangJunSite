    - title: "Evaluating Driving Conflict Risk and Rear-End Risks via Traffic Signal Controller Data"
      authors: "Yang-Jun Joo, Mohamed Abdel-Aty"
      venue: "IEEE Transactions on Intelligent Transportation Systems (Accepted)"
      year: 2025
      tags:
        - "Conflict Risk"
        - "Rear-End Risk"
        - "Smart Mobility"
        - "IEEE T-ITS"
      summary: "Combines high-resolution traffic controller events and vehicle detector logs to model conflict risks at signalized corridors."
      industry_relevance: "Enables smart mobility and risk modeling teams to predict and mitigate localized crash risks without waiting for historical crash reports."
