name: "Yang-Jun Joo, Ph.D."
title: "Yang-Jun Joo, Ph.D. | Autonomous Driving Safety & Mobility Data Analytics"
headline: "Autonomous Driving Safety Evaluation · Conformal Prediction · Traffic Safety Analytics"
summary: "I develop data-driven methods to evaluate driving safety, calibrate AI/ML uncertainty, and analyze large-scale mobility datasets. My research combines traffic safety engineering, deep learning (including vision-language models), conformal prediction, and big data pipelines to support safer connected and automated transportation systems."
location: "Orlando, FL (Open to Remote / Relocation)"
socials:
