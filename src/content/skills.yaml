- group: "Data & Programming"
  items:
    - name: "Python"
      description: "Primary language for data science, deep learning models, and safety evaluation workflows. Proficient in pandas, NumPy, scikit-learn, PyTorch, and VLM APIs."
    - name: "R"
      description: "Used for advanced statistical modeling, econometric analysis, and experimental design validation."
    - name: "SQL"
      description: "Querying and structuring large-scale database systems, performing complex temporal and spatial traffic data aggregations."
    - name: "Data Processing"
      description: "Wrangling large, noisy spatial-temporal datasets including high-resolution traffic signal logs, vehicle telemetry, and sensor streams."
    - name: "Statistics & Experimentation"
      description: "Designing rigorous statistical tests, causal inference workflows, and before-and-after experiments to validate system-level safety changes."
    - name: "Large-scale mobility data workflows"
      description: "Processing millions of high-frequency data points (ATSPM) using distributed computing concepts and cloud-adjacent pipelines."

- group: "Machine Learning & AI"
  items:
    - name: "Machine Learning"
      description: "Applying supervised and unsupervised techniques to classify traffic patterns, predict crash risks, and evaluate driver safety profiles."
    - name: "Conformal Prediction"
      description: "Implementing distribution-free uncertainty quantification frameworks to calibrate ML models and provide rigorous confidence bounds on predictions."
    - name: "VLM Evaluation"
      description: "Adapting and evaluating vision-language models (e.g., GPT-4V, LLaVA, Gemini) to classify and assess complex driving scenes and visual risks."
    - name: "Generative AI"
      description: "Applying generative models (such as tabular GANs) to address class imbalance issues in crash severity prediction datasets."
    - name: "Uncertainty Quantification"
      description: "Developing systems that distinguish between aleatoric and epistemic uncertainties in risk-heavy transportation environments."
    - name: "Model Validation"
      description: "Validating ML models against real-world human data using structured test suites, cross-validation, and out-of-distribution metrics."

- group: "Transportation Safety & Mobility"
  items:
    - name: "Driving Risk Assessment"
      description: "Creating models to quantify scenario risk, human perceived risk, and automated safety indexes in real-world driving environments."
    - name: "Traffic Conflict Analysis"
      description: "Using surrogate safety measures (e.g., time-to-collision, post-encroachment time) to evaluate rear-end and intersection conflict risks."
    - name: "ATSPM"
      description: "Leveraging Automated Traffic Signal Performance Measures to evaluate intersection performance and corridor operations."
    - name: "Traffic Signal Analytics"
      description: "Correlating signal controller event logs, timing plans, and cycle lengths with vehicle safety behaviors and delay analytics."
    - name: "Smart Mobility"
      description: "Applying connected vehicle data, V2X concepts, and advanced sensory inputs to improve public transit and autonomous fleet safety."
    - name: "DOT Project Experience"
      description: "Delivering research, deliverables, and dashboards for state Departments of Transportation (e.g., FDOT) and municipal agencies."

- group: "Research Translation & Communication"
  items:
    - name: "Technical Writing"
      description: "Publishing peer-reviewed articles in high-impact journals (IEEE T-ITS, AMAR, AAP) and drafting detailed technical project reports."
    - name: "Grant Writing"
      description: "Contributing to successful research proposals, work scopes, and funding bids for transportation agencies."
    - name: "Survey Design"
      description: "Creating rigorous survey methodologies and user validation studies to link human risk perception with computational models."
    - name: "Cross-functional Collaboration"
      description: "Partnering with computer scientists, human factors experts, and civil engineers to solve interdisciplinary safety problems."
    - name: "Agency-facing Reporting"
      description: "Presenting complex data insights in clear, actionable business formats to transportation officials and policy-makers."
    - name: "Research Presentation"
      description: "Translating theoretical concepts into production-ready software tools, presenting findings to technical and business stakeholders."
